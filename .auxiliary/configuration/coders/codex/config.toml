model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "friendly"

# approval_policy = "on-request"
# sandbox_mode = "workspace-write"
trust_level = "trusted"
# web_search = "cached"

[features]
# Temporary Linux sandbox workaround while upstream resolves Bubblewrap regressions.
# We first hit #14936 symptoms in 0.115.0:
#   - frequent "retry without sandbox?" prompts
#   - bwrap: loopback: Failed RTM_NEWADDR: Operation not permitted
# After host AppArmor tuning mitigated #14936, we then hit #14694-class
# symlinked writable-root failures in our workflow:
#   - bwrap: Can't create file at <workspace>/.codex: Is a directory
# Use legacy Landlock for now; remove this once robust Bubblewrap fixes land.
use_legacy_landlock = true

## MCP Servers

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.context7.tools.resolve_library_id]
approval_mode = "approve"

[mcp_servers.context7.tools.query_docs]
approval_mode = "approve"

[mcp_servers.nb]
command = "nb-mcp"
args = ["--notebook", "agentmux", "--no-commit-signing"]

[mcp_servers.nb.tools.help]
approval_mode = "approve"

[mcp_servers.nb.tools.nb]
approval_mode = "approve"

[mcp_servers.agentmux]
command = "reloaderoo"
args = [
  "--",
  "cargo",
  "run",
  "--bin",
  "agentmux",
  "--",
  "host",
  "mcp",
]
startup_timeout_sec = 60
tool_timeout_sec = 900

[mcp_servers.agentmux.tools.list]
approval_mode = "approve"

[mcp_servers.agentmux.tools.look]
approval_mode = "approve"

[mcp_servers.agentmux.tools.send]
approval_mode = "approve"

[mcp_servers.agentmux.tools.restart_server]
approval_mode = "approve"

[mcp_servers."pty-debug"]
command = "npx"
args = ["-y", "@so2liu/pty-mcp-server@1.0.11"]

[mcp_servers."pty-debug".tools.spawn_session]
approval_mode = "approve"

[mcp_servers."pty-debug".tools.list_sessions]
approval_mode = "approve"

[mcp_servers."pty-debug".tools.get_snapshot]
approval_mode = "approve"

[mcp_servers."pty-debug".tools.send_input]
approval_mode = "approve"

[mcp_servers."pty-debug".tools.resize_terminal]
approval_mode = "approve"

[mcp_servers."pty-debug".tools.close_session]
approval_mode = "approve"
