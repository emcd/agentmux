model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "friendly"

# approval_policy = "on-request"
# sandbox_mode = "workspace-write"
trust_level = "trusted"
# web_search = "cached"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.nb]
command = "nb-mcp"
args = ["--notebook", "agentmux", "--no-commit-signing"]

[mcp_servers.agentmux]
command = "reloaderoo"
args = [
  "--",
  "cargo",
  "run",
  "--bin",
  "agentmux",
  "--",
  "host",
  "mcp",
]
startup_timeout_sec = 60
tool_timeout_sec = 900

[mcp_servers."pty-debug"]
command = "npx"
args = ["-y", "@so2liu/pty-mcp-server@1.0.11"]
