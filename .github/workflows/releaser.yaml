name: release

on:
  push:
    tags: ['v[0-9]+.*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip actual publishing (test build only)'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:

  initialize:
    uses: ./.github/workflows/core--initializer.yaml

  test:
    needs: [initialize]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.initialize.outputs.platforms) }}
        exclude: ${{ fromJSON(needs.initialize.outputs.matrix-exclusions) }}
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        if: matrix.platform == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: matrix.platform == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  build-binaries:
    needs: [initialize, test]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.initialize.outputs.platforms) }}
        exclude: ${{ fromJSON(needs.initialize.outputs.matrix-exclusions) }}
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Determine Binary Name
        id: binary
        shell: bash
        run: |
          target="${{ fromJSON(needs.initialize.outputs.rust-targets)[matrix.platform] }}"
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            binary_name="agentmux-${target}.exe"
            cp target/release/agentmux.exe "${binary_name}"
          else
            binary_name="agentmux-${target}"
            cp target/release/agentmux "${binary_name}"
          fi
          echo "name=${binary_name}" >>${GITHUB_OUTPUT}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: ${{ steps.binary.outputs.name }}

